<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoeJÁ - Conectando doadores de alimentos a ONGs</title>
  <!-- Google Fonts for Friendly Rounded & Retro Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body class="theme-organic">
  <!-- Theme Toggler (Floating Control) -->
  <button id="theme-toggle" class="theme-toggle-btn" aria-label="Alternar Tema">
    <span class="toggle-icon">🎨</span>
    <span class="toggle-text">Estilo: Orgânico</span>
  </button>

  <!-- Top Navigation Header -->
  <header class="main-header">
    <div class="nav-container">
      <div class="logo">
        <svg class="header-logo-svg" width="40" height="40" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="85" fill="#a3c767" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
          <path d="M 60,110 Q 100,50 140,110" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" />
          <circle cx="100" cy="120" r="25" fill="#f2911b" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
        </svg>
        <span class="logo-text">DoeJÁ</span>
      </div>
      <nav class="nav-menu">
        <a href="#" class="nav-link">Doações</a>
        <a href="#" class="nav-link">ONG's</a>
        <a href="#" class="nav-link">Seja um parceiro!</a>
      </nav>
      <button class="login-btn">Login</button>
    </div>
  </header>

  <!-- Main Content Layout -->
  <main class="hero-section">
    <div class="hero-container">
      
      <!-- Left Illustration: Daisy -->
      <div class="illustration-wrapper left-ill">
        <svg id="svg-daisy" class="ill-svg" viewBox="0 0 200 200">
          <!-- Flower Stem -->
          <path d="M100 130 Q105 160 95 190" stroke="#7BA832" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M102 150 Q120 145 115 135" stroke="#7BA832" stroke-width="8" fill="#7BA832" stroke-linecap="round"/>
          
          <!-- Flower Petals -->
          <g id="daisy-petals" fill="white" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)">
            <circle cx="100" cy="50" r="22" />
            <circle cx="100" cy="130" r="22" />
            <circle cx="60" cy="90" r="22" />
            <circle cx="140" cy="90" r="22" />
            <circle cx="72" cy="62" r="22" />
            <circle cx="128" cy="118" r="22" />
            <circle cx="72" cy="118" r="22" />
            <circle cx="128" cy="62" r="22" />
          </g>

          <!-- Flower Center (Yellow) -->
          <circle cx="100" cy="90" r="32" fill="#FFD214" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
          
          <!-- Eyes -->
          <circle class="eye" cx="88" cy="85" r="4.5" fill="black" />
          <circle class="eye" cx="112" cy="85" r="4.5" fill="black" />
          
          <!-- Smile -->
          <path d="M 88,96 Q 100,108 112,96" fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round" />
        </svg>
      </div>

      <!-- Center Box: Main Text and Logo -->
      <div class="center-content">
        <h1 class="hero-title">
          Seu gesto pode mudar histórias<br>
          <span class="highlight-doe">Doe</span><span class="highlight-ja">JÁ</span> e leve mais do que alimento, leve cuidado e esperança.
        </h1>
        <div class="center-logo-wrapper">
          <svg id="svg-hands" class="hands-svg" viewBox="0 0 200 200">
            <!-- Green Circle Frame -->
            <circle cx="100" cy="100" r="90" fill="none" stroke="#A3C767" stroke-width="6" stroke-dasharray="10 6" />
            <!-- Four interlocking hands vector -->
            <!-- Top Hand (Green) -->
            <path d="M70,55 L130,55 Q135,55 135,60 L135,70 Q135,75 130,75 L115,75 L115,85 Q115,90 110,90 L90,90 Q85,90 85,85 L85,75 L70,75 Q65,75 65,70 L65,60 Q65,55 70,55 Z" fill="#1a6b32" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
            <!-- Right Hand (Orange) -->
            <path d="M145,70 L145,130 Q145,135 140,135 L130,135 Q125,135 125,130 L125,115 L115,115 Q110,115 110,110 L110,90 Q110,85 115,85 L125,85 L125,70 Q125,65 130,65 L140,65 Q145,65 145,70 Z" fill="#f2911b" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
            <!-- Bottom Hand (Green) -->
            <path d="M130,145 L70,145 Q65,145 65,140 L65,130 Q65,125 70,125 L85,125 L85,115 Q85,110 90,110 L110,110 Q115,110 115,115 L115,125 L130,125 Q135,125 135,130 L135,140 Q135,145 130,145 Z" fill="#1a6b32" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
            <!-- Left Hand (Orange) -->
            <path d="M55,130 L55,70 Q55,65 60,65 L70,65 Q75,65 75,70 L75,85 L85,85 Q90,85 90,90 L90,110 Q90,115 85,115 L75,115 L75,130 Q75,135 70,135 L60,135 Q55,135 55,130 Z" fill="#f2911b" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)" />
            <!-- Center connection heart/circle -->
            <circle cx="100" cy="100" r="14" fill="#FDEDE4" stroke="#f2911b" stroke-width="3" />
            <path d="M100,105 Q100,105 97,102 Q94,99 94,96.5 A2.5,2.5 0 0,1 99,95 Q100,97 100,97 Q100,97 101,95 A2.5,2.5 0 0,1 106,96.5 Q106,99 103,102 Q100,105 100,105 Z" fill="#f2911b" />
          </svg>
        </div>
      </div>

      <!-- Right Illustration: Celebrating Woman -->
      <div class="illustration-wrapper right-ill">
        <svg id="svg-woman" class="ill-svg" viewBox="0 0 200 200">
          <!-- Wavy Hair behind -->
          <path d="M60 90 Q40 120 70 150 Q110 160 140 140 Q160 110 140 80 Q130 50 100 50 Q70 50 60 90 Z" fill="#3A2312" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Celebrating Hand / Raised Arm -->
          <path class="woman-arm" d="M130 90 Q170 50 165 40 Q155 35 125 70 L115 85 Z" fill="#E8B085" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Head -->
          <circle cx="100" cy="90" r="30" fill="#E8B085" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Curly Hair details -->
          <circle cx="75" cy="70" r="16" fill="#3A2312" />
          <circle cx="125" cy="70" r="16" fill="#3A2312" />
          <circle cx="100" cy="62" r="18" fill="#3A2312" />

          <!-- Face Details -->
          <!-- Eyes -->
          <circle cx="92" cy="90" r="3" fill="black" />
          <circle cx="108" cy="90" r="3" fill="black" />
          <!-- Cheeks -->
          <circle cx="85" cy="96" r="4" fill="#FF8E8E" opacity="0.6"/>
          <circle cx="115" cy="96" r="4" fill="#FF8E8E" opacity="0.6"/>
          <!-- Smile -->
          <path d="M 94,98 Q 100,105 106,98" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" />

          <!-- Golden Earrings -->
          <circle cx="70" cy="95" r="5" fill="none" stroke="#FFD214" stroke-width="2"/>
          <circle cx="130" cy="95" r="5" fill="none" stroke="#FFD214" stroke-width="2"/>
          
          <!-- Body / T-Shirt -->
          <path d="M70 120 C70 120 75 180 60 190 L140 190 C125 180 130 120 130 120 Z" fill="#E55944" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          <!-- Neck -->
          <path d="M92 118 L92 125 L108 125 L108 118 Z" fill="#E8B085" />
          
          <!-- Heart on T-Shirt -->
          <path d="M100 155 Q100 155 94 149 Q88 143 88 138 A5,5 0 0 1 98 135 Q100 139 100 139 Q100 139 102 135 A5,5 0 0 1 112 138 Q112 143 106 149 Q100 155 100 155 Z" fill="white" />
          
          <!-- Left Arm reaching out -->
          <path d="M72 125 Q40 135 30 145 Q35 155 50 145 L72 135 Z" fill="#E8B085" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
        </svg>
      </div>

    </div>
  </main>

  <!-- Bottom Elements and Footer -->
  <footer class="main-footer">
    <div class="footer-decorations">
      <div class="decor-eggplant">
        <svg id="svg-eggplant" viewBox="0 0 100 120" width="80" height="96">
          <!-- Eggplant Stem -->
          <path d="M50 30 Q50 10 60 10" stroke="#7BA832" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M35 30 Q50 20 65 30 Q60 40 50 38 Q40 40 35 30 Z" fill="#7BA832" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Eggplant Body -->
          <path d="M30 40 C20 60 15 90 35 105 C55 120 75 115 80 95 C85 75 70 50 70 40 C70 40 55 35 30 40 Z" fill="#784B8E" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Face -->
          <circle class="eye" cx="44" cy="65" r="3" ry="3" fill="black" />
          <circle class="eye" cx="62" cy="65" r="3" ry="3" fill="black" />
          <!-- Cheeks -->
          <circle cx="39" cy="70" r="3" fill="#FF8E8E" opacity="0.6"/>
          <circle cx="67" cy="70" r="3" fill="#FF8E8E" opacity="0.6"/>
          <!-- Mouth -->
          <path d="M 49,70 Q 53,74 57,70" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" />
        </svg>
      </div>
      <div class="decor-tomato">
        <svg id="svg-tomato" viewBox="0 0 120 120" width="96" height="96">
          <!-- Tomato Stem/Leaves -->
          <path d="M60 25 Q60 10 65 10" stroke="#7BA832" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M40 28 Q60 15 80 28 Q70 38 60 33 Q50 38 40 28 Z" fill="#7BA832" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Tomato Body -->
          <circle cx="60" cy="65" r="35" fill="#E5493A" stroke="var(--stroke-color)" stroke-width="var(--stroke-width)"/>
          
          <!-- Face -->
          <circle class="eye" cx="48" cy="60" r="3.5" ry="3.5" fill="black" />
          <circle class="eye" cx="72" cy="60" r="3.5" ry="3.5" fill="black" />
          <!-- Cheeks -->
          <circle cx="42" cy="66" r="3.5" fill="#FF8E8E" opacity="0.6"/>
          <circle cx="78" cy="66" r="3.5" fill="#FF8E8E" opacity="0.6"/>
          <!-- Smile -->
          <path d="M 55,66 Q 60,72 65,66" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" />
        </svg>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
